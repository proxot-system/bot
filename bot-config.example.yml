config-check-level: 4
# ~ = disables the check completely
# 1 = stops the bot on required
# 2 = stops the bot on missing
# 3 = doesn't log missing
bot:
  token: "MTAyODA1ODA5NzM4MzY0MTExOA.4R9ncw.LWxLZQXHygROBuEr5xeuXocO-Kb" # replace with yours
  logging-level: DEBUG
  prod:
    token: "MTAxNTYyOTYwNDUzNjQ2MzQyMQ.a__Fep.Ki-TLCbGHrKcIPS2JjUMKTsyapl" # replace with yours, or a tilde (no quotes) so it always uses token above
    override: ~ # boolean
    branch: "origin"
    command-marker: "[.]" # see dev.command-marker
    logging-level: WARN
  debug: ~ # boolean, defaults to false on prod

  rolling:
    avatar: true # uses unstable.png if not on prod
    status: true # has no status at all instead
    interval: 3600 # seconds
    statuses: # can be ~ or just a string
      - "[ ... ]" # can use the variables: {guild_count,, pretty_num} {shard_count, pretty_num}
      - "[ ... ]"
      - "[ ... ]" # e.g. - - - - \/
      - "[ Monitoring over {guild_count, pretty_num} places at once. ]"
      - "[ Do I really have to do things for these users? ]"
      - "[ No thoughts right now. ]"

  links:
    website-root: https://theworldmachine.xyz
    textbox-website-root: https://tb.theworldmachine.xyz
    discord-invite: "https://discord.com/invite/UuyuubugZ9"
    add-twm-bot: "https://theworldmachine.xyz/add-twm"

  main:
    guild-id: "1017531963000754247" # server id, the main community server for the bot
    roles:
      contributor-id: "1054832328729427988"
      translator-id: "1337522400367218758"
      supporter-id: "1044343502353481788"

paths:
  # to avoid bugs - do not end any of these with a /
  # files outside the src folder will not be tracked properly for edits. you may use the "src/data/ignored" folder if you want to have files that are not tracked by git
  emojis: "src/data/emojis.yml"
  facepics: "src/data/facepics.yml"
  localization:
    root: "src/data/locales/bot"
  textbox:
    fonts: "src/data/fonts"
    color-parser-binary: "src/utilities/textbox/csscolors/target/release/csscolors" # you have to run `cargo build --release` in the csscolors directory for this binary to appear. setup Rust on your system first: https://rustup.rs/ (install cargo)

modules:
  # whether the module is enabled or not
  welcome: true
  music: false
  devcommands: true

dev:
  guild-id: "1017479547664482444" # string, server id
  channels:
    logs: "1017479547664482444" # string, channel id
    more: "1381622140125577276" # string, channel id
  send-startup-message: true

  command-marker: "[.]" # dev commands command indicator, e.g. [bot shell git pull] value examples: <.> (.) [.] {.} ^.^
  whitelist:
    - "744276454946242723"
    - ~ #  strings, user ids
    - "831530536781873163"

watcher:
  ignore-4913:
    true
    # vim (the text editor) creates a file to check whether it can write files in the folder, causing random bullshi
    # this should be a FileWatcher init option but too lazy, probably will implement later or wait for someone to pr (unimportant)

database:
  connection: # mongodb+srv://{username}:{password}@{host}
    username: "meqativ" # replace with yours
    password: "password"
    host: "localhost" # domain name / ip / localhost
    port: 27017

  dns-fix: false # use this if you're on termux and connecting to db doesn't work

localization:
  weblate-token:
    "wlu_XnaUbp8Hq62163Xau5i6AT37K9kYzn3423wz"
    # ↑ replace with yours, get at https://translate.theworldmachine.xyz/access/discord-bot/#api
    #   go to Personal API key and copypaste it here
  source-locale: en-GB # string, make sure the locale is 100% complete
  debug: true # boolean, defaults to false on prod, shows detailed error messages for not found paths if true
  whitelist:
    en:
      - ~
      - ~ #  strings, user ids

textbox:
  web:
    port: 4230
  limits:
    filesize: 52428800 # 50 * 1024 * 1024
    frames: 250
    frame-text-length: 2423
  font: "src/data/fonts/TerminusTTF-Bold.ttf"
  unproxied-hosts:
    - discordapp.com
    - discordapp.net
    - discord.com
    - github.com
    - githubusercontent.com

music: # deprecated
  spotify:
    secret: ~
    id: ~

  lavalink:
    ip: "localhost"
    port: 4231
    password: password_here
